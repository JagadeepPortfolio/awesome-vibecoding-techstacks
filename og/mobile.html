<!DOCTYPE html>
<html><head><meta charset="utf-8"/><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#7c2d12 50%,#0f172a 100%);font-family:system-ui,-apple-system,sans-serif;overflow:hidden;position:relative}
.glow{position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(120px);opacity:.3}
.g1{background:#f97316;top:-100px;right:100px}
.g2{background:#e11d48;bottom:-100px;left:100px}
.content{text-align:center;z-index:1;position:relative}
.label{font-size:22px;color:#fb923c;text-transform:uppercase;letter-spacing:4px;font-weight:700;margin-bottom:12px}
h1{font-size:64px;font-weight:800;color:white;letter-spacing:-2px}
p{font-size:26px;color:#94a3b8;margin-top:12px}
.techs{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap;max-width:800px}
.tech{background:rgba(249,115,22,.15);color:#fdba74;padding:6px 16px;border-radius:100px;font-size:16px;font-weight:600;border:1px solid rgba(249,115,22,.3)}
.badge{position:absolute;bottom:30px;right:40px;color:#64748b;font-size:16px}
.bolt{position:absolute;top:30px;left:40px;color:white;font-size:18px;font-weight:700}
</style></head>
<body>
<div class="glow g1"></div><div class="glow g2"></div>
<div class="bolt">⚡ Open TechStack</div>
<div class="content">
<div class="label">Mobile Guide 2026</div>
<h1>40+ Technologies Compared</h1>
<p>React Native, Flutter, SwiftUI, KMP, testing, and more</p>
<div class="techs">
<span class="tech">React Native</span><span class="tech">Expo</span><span class="tech">Flutter</span><span class="tech">SwiftUI</span><span class="tech">KMP</span><span class="tech">Detox</span><span class="tech">Fastlane</span><span class="tech">Firebase</span><span class="tech">NativeWind</span>
</div>
</div>
<div class="badge">opentechstack.stitchwebsite.com</div>
</body></html>
