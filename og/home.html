<!DOCTYPE html>
<html><head><meta charset="utf-8"/><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);font-family:system-ui,-apple-system,sans-serif;overflow:hidden;position:relative}
.glow{position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(120px);opacity:.3}
.g1{background:#6366f1;top:-100px;left:-50px}
.g2{background:#06b6d4;bottom:-100px;right:-50px}
.g3{background:#10b981;top:50%;left:50%;transform:translate(-50%,-50%)}
.content{text-align:center;z-index:1;position:relative}
h1{font-size:72px;font-weight:800;color:white;letter-spacing:-2px;line-height:1.1}
.highlight{background:linear-gradient(135deg,#6366f1,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{font-size:28px;color:#94a3b8;margin-top:16px;font-weight:400}
.tags{display:flex;gap:12px;justify-content:center;margin-top:28px}
.tag{background:rgba(255,255,255,.1);color:#e2e8f0;padding:8px 20px;border-radius:100px;font-size:18px;font-weight:600;border:1px solid rgba(255,255,255,.15)}
.badge{position:absolute;bottom:30px;right:40px;color:#64748b;font-size:16px}
.bolt{position:absolute;top:30px;left:40px;font-size:40px}
</style></head>
<body>
<div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>
<div class="bolt">⚡</div>
<div class="content">
<h1>Open <span class="highlight">TechStack</span></h1>
<p>Interactive visual guides to 200+ modern technologies</p>
<div class="tags">
<span class="tag">Frontend</span>
<span class="tag">Backend</span>
<span class="tag">AI/ML</span>
<span class="tag">DevOps</span>
<span class="tag">Mobile</span>
</div>
</div>
<div class="badge">opentechstack.stitchwebsite.com</div>
</body></html>
