<!DOCTYPE html>
<html><head><meta charset="utf-8"/><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#064e3b 50%,#0f172a 100%);font-family:system-ui,-apple-system,sans-serif;overflow:hidden;position:relative}
.glow{position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(120px);opacity:.3}
.g1{background:#10b981;top:-100px;left:100px}
.g2{background:#06b6d4;bottom:-100px;right:100px}
.content{text-align:center;z-index:1;position:relative}
.label{font-size:22px;color:#34d399;text-transform:uppercase;letter-spacing:4px;font-weight:700;margin-bottom:12px}
h1{font-size:64px;font-weight:800;color:white;letter-spacing:-2px}
p{font-size:26px;color:#94a3b8;margin-top:12px}
.techs{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap;max-width:800px}
.tech{background:rgba(16,185,129,.15);color:#6ee7b7;padding:6px 16px;border-radius:100px;font-size:16px;font-weight:600;border:1px solid rgba(16,185,129,.3)}
.badge{position:absolute;bottom:30px;right:40px;color:#64748b;font-size:16px}
.bolt{position:absolute;top:30px;left:40px;color:white;font-size:18px;font-weight:700}
</style></head>
<body>
<div class="glow g1"></div><div class="glow g2"></div>
<div class="bolt">⚡ Open TechStack</div>
<div class="content">
<div class="label">DevOps Guide 2026</div>
<h1>40+ Technologies Compared</h1>
<p>CI/CD, IaC, containers, cloud, monitoring, and more</p>
<div class="techs">
<span class="tech">GitHub Actions</span><span class="tech">Terraform</span><span class="tech">Docker</span><span class="tech">Kubernetes</span><span class="tech">AWS</span><span class="tech">Grafana</span><span class="tech">ArgoCD</span><span class="tech">Vault</span><span class="tech">Helm</span>
</div>
</div>
<div class="badge">opentechstack.stitchwebsite.com</div>
</body></html>
