<!DOCTYPE html>
<html><head><meta charset="utf-8"/><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#312e81 50%,#0f172a 100%);font-family:system-ui,-apple-system,sans-serif;overflow:hidden;position:relative}
.glow{position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(120px);opacity:.3}
.g1{background:#6366f1;top:-100px;left:100px}
.g2{background:#10b981;bottom:-100px;right:100px}
.content{text-align:center;z-index:1;position:relative}
.label{font-size:22px;color:#818cf8;text-transform:uppercase;letter-spacing:4px;font-weight:700;margin-bottom:12px}
h1{font-size:64px;font-weight:800;color:white;letter-spacing:-2px}
p{font-size:26px;color:#94a3b8;margin-top:12px}
.techs{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap;max-width:800px}
.tech{background:rgba(99,102,241,.15);color:#a5b4fc;padding:6px 16px;border-radius:100px;font-size:16px;font-weight:600;border:1px solid rgba(99,102,241,.3)}
.badge{position:absolute;bottom:30px;right:40px;color:#64748b;font-size:16px}
.bolt{position:absolute;top:30px;left:40px;color:white;font-size:18px;font-weight:700}
</style></head>
<body>
<div class="glow g1"></div><div class="glow g2"></div>
<div class="bolt">⚡ Open TechStack</div>
<div class="content">
<div class="label">Backend Guide 2026</div>
<h1>50+ Technologies Compared</h1>
<p>Languages, BaaS, databases, auth, hosting, and more</p>
<div class="techs">
<span class="tech">Node.js</span><span class="tech">Python</span><span class="tech">Go</span><span class="tech">Rust</span><span class="tech">Supabase</span><span class="tech">Postgres</span><span class="tech">Clerk</span><span class="tech">Stripe</span><span class="tech">Vercel</span><span class="tech">Sentry</span>
</div>
</div>
<div class="badge">opentechstack.stitchwebsite.com</div>
</body></html>
